<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Logic | Precision Automation Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #020617;
            --bg-secondary: #0f172a;
            --accent-primary: #3b82f6;
            --accent-secondary: #0ea5e9;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --sapphire-bright: #bfdbfe;
            --sapphire-deep: #1d4ed8;
            --lux-base: #030712;
            --radius-xl: 32px;
            --radius-inner: 31px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .serif { font-family: 'Playfair Display', serif; }
        .code-font { font-family: 'Fira Code', monospace; }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
        }

        .gradient-text {
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Original Luxury Text Bar */
        .lux-input-container {
            position: relative;
            background: var(--lux-base);
            border-radius: var(--radius-xl);
            padding: 1px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .lux-input-container:focus-within {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.2), 0 30px 60px -20px rgba(0,0,0,0.9);
        }

        .lux-rgb-glow {
            position: absolute;
            inset: -4px;
            border-radius: calc(var(--radius-xl) + 4px);
            z-index: -1;
            opacity: 0;
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.15), transparent 70%);
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .lux-input-container:focus-within .lux-rgb-glow {
            opacity: 1;
        }

        .lux-velvet-surface {
            background: radial-gradient(circle at 50% 0%, #0c0f1d, var(--lux-base));
            border-radius: var(--radius-inner);
            position: relative;
            overflow: hidden;
            flex: 1;
        }

        .lux-velvet-surface::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.02;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        * { transition: all 0.3s ease; outline: none !important; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.8s ease-out forwards; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
