
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPy Architect | A Human Touch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Patrick+Hand&family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f5f1e9;
            --ink: #3d405b;
            --accent: #e07a5f;
            --secondary: #81b29a;
            --highlight: #f2cc8f;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            background-image: 
                radial-gradient(var(--ink) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            background-opacity: 0.05;
        }
        .serif { font-family: 'Libre Baskerville', serif; }
        .hand { font-family: 'Patrick Hand', cursive; }
        .code-font { font-family: 'Fira Code', monospace; }
        
        .sketch-border {
            border: 2px solid var(--ink);
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
        }
        
        .paper-card {
            background: white;
            box-shadow: 5px 5px 0px rgba(61, 64, 91, 0.1);
            transition: transform 0.2s ease;
        }
        
        .paper-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px rgba(61, 64, 91, 0.15);
        }

        .tilted-left { transform: rotate(-1deg); }
        .tilted-right { transform: rotate(1.2deg); }
        
        input, textarea, button {
            transition: all 0.2s ease;
        }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--paper); }
        ::-webkit-scrollbar-thumb { 
            background: var(--accent); 
            border: 2px solid var(--paper);
            border-radius: 10px;
        }
    </style>

</body>
</html>
